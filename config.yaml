        url: "https://atlas.prod.cloudera.example.com"
      - name: YARN Resource Manager
        icon: "🔄"
        description: "Cluster resource management and job monitoring"
        url: "https://rm.prod.cloudera.example.com:8088"
      - name: Spark History Server
